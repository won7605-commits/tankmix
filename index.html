<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f7a4d">
<meta name="robots" content="noindex, nofollow">
<title>농약 혼용정보 검색</title>
<style>
  :root{
    --green:#1f7a4d; --green-d:#155d3a; --bg:#f4f6f5; --card:#fff;
    --line:#e3e8e5; --txt:#1c2b24; --mut:#6b7d74;
    --살균제:#e0533d; --살충제:#2563eb; --살균살충제:#7c3aed;
    --3종혼합:#0d9488; --영양제:#16a34a; --기타제:#6b7280; --제초제:#b45309;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;
    background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;}
  header{position:sticky;top:0;z-index:20;background:var(--green);color:#fff;
    padding:12px 16px 0;box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .h-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .h-sub{font-size:11px;opacity:.85;margin-top:2px;}
  .tabs{display:flex;margin-top:10px;gap:2px;}
  .tab{flex:1;text-align:center;padding:12px 4px;font-size:18px;font-weight:700;
    color:#dff0e7;border-bottom:3px solid transparent;cursor:pointer;}
  .tab.on{color:#fff;border-bottom-color:#fff;}
  main{max-width:760px;margin:0 auto;padding:14px 12px 60px;}
  .search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .search.sub{padding:8px 11px;background:#eef3f0;border-color:#d7e2db;margin-bottom:12px;}
  .search.sub input{font-size:14.5px;}
  .search input{border:0;outline:0;flex:1;font-size:16px;background:transparent;color:var(--txt);}
  .search .ico{color:var(--mut);font-size:18px;}
  .clear{color:var(--mut);font-size:20px;cursor:pointer;padding:0 4px;display:none;}
  .hint{color:var(--mut);font-size:12.5px;margin:-4px 2px 12px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:7px 13px;font-size:14px;cursor:pointer;font-weight:600;color:var(--txt);}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green);}
  .sec-label{font-size:12px;font-weight:700;color:var(--mut);margin:14px 2px 8px;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:11px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card-h{display:flex;align-items:center;justify-content:space-between;
    padding:13px 15px;cursor:pointer;font-weight:800;font-size:17.5px;}
  .card-h .cnt{font-size:11.5px;color:var(--mut);font-weight:600;}
  .card-h .arw{color:var(--mut);transition:transform .18s;font-size:13px;margin-left:8px;}
  .card.open .card-h .arw{transform:rotate(90deg);}
  .card-b{display:none;padding:0 15px 13px;}
  .card.open .card-b{display:block;}
  .catrow{margin-top:11px;}
  .catrow:first-child{margin-top:4px;}
  .badge{display:inline-block;color:#fff;font-size:11.5px;font-weight:800;
    padding:3px 9px;border-radius:6px;margin-bottom:7px;}
  .items{display:flex;flex-wrap:wrap;gap:6px;}
  .item{background:#f1f4f2;border:1px solid #e6ebe8;border-radius:8px;
    padding:7px 11px;font-size:15.5px;color:#283a31;}
  .item.mark{background:#fff3cd;border-color:#ffe08a;font-weight:700;}
  .combo{background:#f0fbf8;border:1px solid #cdeee7;border-radius:8px;
    padding:7px 11px;font-size:14.5px;color:#0f5c52;width:100%;margin-bottom:5px;}
  .combo.mark{background:#fff3cd;border-color:#ffe08a;}
  .empty{text-align:center;color:var(--mut);padding:40px 16px;font-size:14px;}
  .empty .big{font-size:34px;margin-bottom:8px;}
  .rev-grp{font-weight:800;font-size:15px;margin:16px 2px 6px;color:var(--green-d);
    display:flex;align-items:center;gap:6px;}
  .rev-line{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:10px 13px;margin-bottom:7px;font-size:14px;}
  .rev-line b{color:var(--txt);}
  .rev-line .meta{color:var(--mut);font-size:12px;margin-top:2px;}
  .ac{position:relative;}
  .aclist{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;
    border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);
    max-height:260px;overflow:auto;z-index:30;display:none;}
  .acitem{padding:10px 14px;font-size:14.5px;cursor:pointer;border-bottom:1px solid #f0f3f1;}
  .acitem:last-child{border-bottom:0;}
  .acitem b{color:var(--green);}
  .acitem .sub{color:var(--mut);font-size:11.5px;margin-left:6px;}
  .own{display:inline-block;background:var(--green);color:#fff;font-size:10.5px;font-weight:800;
    padding:1px 6px;border-radius:5px;margin-right:5px;vertical-align:middle;}
  .panel{margin-top:24px;border-top:2px dashed var(--line);padding-top:16px;}
  .panel-title{font-size:14.5px;font-weight:800;color:var(--green-d);margin-bottom:10px;
    display:flex;align-items:center;gap:6px;}
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);
    border-radius:10px;background:#fff;}
  table.dt{border-collapse:collapse;width:100%;font-size:13.5px;}
  table.dt th{background:#eef3f0;color:#274a3b;font-weight:800;padding:9px 11px;text-align:left;
    white-space:nowrap;border-bottom:1px solid var(--line);}
  table.dt td{padding:8px 11px;border-bottom:1px solid #eef1ef;vertical-align:middle;}
  table.dt tr:last-child td{border-bottom:0;}
  table.dt .markhit{background:#fff3cd;font-weight:700;border-radius:4px;padding:1px 4px;}
  table.dt .badge{margin:0;}
  .tbl-empty{color:var(--mut);font-size:13px;padding:18px;text-align:center;}
  .tbl-count{font-size:12px;color:var(--mut);margin:8px 2px 0;}
  .toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .count{font-size:12.5px;color:var(--mut);}
  .toolbtn{font-size:12.5px;color:var(--green);font-weight:700;cursor:pointer;}
  footer{text-align:center;color:var(--mut);font-size:11px;padding:14px;}
</style>
</head>
<body>
<header>
  <div class="h-title">🌿 농약 혼용정보 검색</div>
  <div class="h-sub" id="hsub"></div>
  <div class="tabs">
    <div class="tab on" data-tab="crop">작물명</div>
    <div class="tab" data-tab="prod">약제명</div>
  </div>
</header>
<main>
  <!-- 작물별 -->
  <section id="tab-crop">
    <div class="search">
      <span class="ico">🔍</span>
      <input id="cropSearch" placeholder="작물 이름 검색 (예: 고추, 사과)" autocomplete="off">
      <span class="clear" id="cropClear">×</span>
    </div>
    <div id="cropChips" class="chips"></div>
    <div class="search sub">
      <span class="ico">🔎</span>
      <input id="cropDrugSearch" placeholder="약제 이름으로 좁히기 (선택 작물 안에서)" autocomplete="off">
      <span class="clear" id="cropDrugClear">×</span>
    </div>
    <div id="cropResult"></div>
  </section>
  <!-- 약제명 (자사+타사 통합) -->
  <section id="tab-prod" style="display:none">
    <div class="search ac">
      <span class="ico">🔍</span>
      <input id="prodSearch" placeholder="약제명 검색 (자사·타사 모두 / 예: 가스란, 카브리오)" autocomplete="off">
      <span class="clear" id="prodClear">×</span>
      <div class="aclist" id="prodAc"></div>
    </div>
    <div class="hint">약제를 고르면 어떤 작물에서 무엇과 혼용 가능한지 보여줍니다. <b>자사</b> 표시는 동방아그로 제품.</div>
    <div class="search sub">
      <span class="ico">🔎</span>
      <input id="prodCropSearch" placeholder="작물 이름으로 좁히기 (예: 고추, 사과)" autocomplete="off">
      <span class="clear" id="prodCropClear">×</span>
    </div>
    <div id="prodResult"></div>
  </section>
</main>

const norm = s => (s||"").replace(/\s+/g,"").toLowerCase();

// ---- 파생 인덱스 (브라우저에서 생성) ----
const byCrop = {};            // crop -> [{product, cats}]
const mixIndex = {};          // 혼용약제명 -> [[product, crop, cat]]
for(const p of DATA.products){
  for(const cr of p.crops){
    (byCrop[cr.crop] = byCrop[cr.crop]||[]).push({product:p.name, cats:cr.cats});
    for(const ct of cr.cats){
      if(ct.cat==='3종혼합') continue;   // 역검색은 단일 약제 대상 — 조합 레시피는 제외
      for(const it of ct.items){
        (mixIndex[it] = mixIndex[it]||[]).push([p.name, cr.crop, ct.cat]);
      }
    }
  }
}
for(const c in byCrop) byCrop[c].sort((a,b)=>a.product.localeCompare(b.product,'ko'));

// 자사 약제 집합
const ownSet = new Set(DATA.products.map(p=>p.name));

// 제형 약자 → 풀네임 매핑
const FORM = {
  '액상':'액상수화제','수':'수화제','입상':'입상수화제','유':'유제','유탁':'유탁제',
  '분액':'분산성액제','액':'액제','유현':'유현탁제','입수용':'입상수용제','미탁':'미탁제',
  '수용':'수용제','캡현':'캡슐현탁제','유상수':'유상수화제','유상':'유상수화제',
  '분산':'분산성액제','분산성':'분산성액제','입':'입제','과훈':'과립훈증제','수화':'수화제',
  '입수':'입상수용제','캡슐현탁':'캡슐현탁제','캡슐':'캡슐현탁제','미':'미탁제',
  '도포':'도포제','애상':'액상수화제'
};
// "카브리오(유)" → "카브리오 유제" (자사명은 괄호 없어 그대로)
function expandName(name){
  const m = String(name).match(/^(.*?)\(([^()]+)\)\s*$/);
  if(!m) return name;
  const base = m[1].trim(), t = m[2];
  if(FORM[t]) return base + ' ' + FORM[t];
  if(/제$/.test(t)) return base + ' ' + t;   // 이미 풀네임
  return name;                                // 브랜드 등 미상 → 원형 유지
}

// 평면 인덱스: 모든 (작물, 자사약제, 구분, 혼용목록) 행 — 표 검색용
const flatRows = [];
for(const p of DATA.products)
  for(const cr of p.crops)
    for(const ct of cr.cats)
      flatRows.push({crop:cr.crop, prod:p.name, cat:ct.cat, items:ct.items});

// ===== 풀네임 정규화: 같은 제품의 표기 변형을 하나로 합침 =====
// 예) 다이마이트(분산)·(분산성)·(분액) → "다이마이트 분산성액제" 하나로
//     카브리오(유)·(액)·(입상) → 유제/액제/입상수화제 (서로 다른 제품, 분리 유지)
const canonMap = new Map();            // 풀네임 → Set(원본 표기들)
function addCanon(raw){
  const c = expandName(raw);
  if(!canonMap.has(c)) canonMap.set(c, new Set());
  canonMap.get(c).add(raw);
}
ownSet.forEach(addCanon);
Object.keys(mixIndex).forEach(addCanon);

const allNames = Array.from(canonMap.keys()).sort((a,b)=>a.localeCompare(b,'ko'));
const canonIsOwn  = c => { for(const r of canonMap.get(c)||[]) if(ownSet.has(r)) return true; return false; };
const canonOwnName= c => { for(const r of canonMap.get(c)||[]) if(ownSet.has(r)) return r; return null; };
function canonMixHits(c){               // 변형들의 mixIndex를 합치고 (자사약제·작물·구분) 중복 제거
  const seen=new Set(), out=[];
  for(const r of (canonMap.get(c)||[])) (mixIndex[r]||[]).forEach(t=>{
    const k=t[0]+'|'+t[1]+'|'+t[2];
    if(!seen.has(k)){ seen.add(k); out.push(t); }
  });
  return out;
}

// 자사약제의 '자기 종류' = 다른 시트에서 파트너로 등장할 때의 구분 (살균제/살충제…)
const prodType = {};
flatRows.forEach(r=>{ if(r.cat==='3종혼합') return; r.items.forEach(it=>{
  const c=expandName(it);
  if(ownSet.has(c) && !(c in prodType)) prodType[c]=r.cat;
});});

document.getElementById('hsub').textContent =
  `동방아그로 2026 · 약제 ${allNames.length}(자사 ${DATA.meta.n_products}) · 작물 ${DATA.meta.n_crops}`;
document.getElementById('foot').textContent =
  `출처: ${DATA.meta.source} · 빌드 ${DATA.meta.built} · ※ (주)동방아그로 제품 혼용 정보`;

const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s+"").replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const badge = cat => `<span class="badge" style="background:var(--${cat},#6b7280)">${cat}</span>`;

// 카테고리 블록 렌더 (mark: 강조할 약제명 norm 문자열)
function renderCats(cats, markN){
  const wrap = el('div');
  cats.slice().sort((a,b)=>CAT_ORDER.indexOf(a.cat)-CAT_ORDER.indexOf(b.cat)).forEach(ct=>{
    const row = el('div','catrow');
    row.innerHTML = badge(ct.cat);
    const isCombo = ct.cat==='3종혼합';
    const box = el('div', isCombo?'':'items');
    ct.items.forEach(it=>{
      const hit = markN && norm(it).includes(markN);
      box.appendChild(el('div',
        (isCombo?'combo':'item')+(hit?' mark':''), esc(it)));
    });
    row.appendChild(box);
    wrap.appendChild(row);
  });
  return wrap;
}

// ========== 탭 전환 ==========
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    const id=t.dataset.tab;
    $('#tab-crop').style.display = id==='crop'?'':'none';
    $('#tab-prod').style.display = id==='prod'?'':'none';
  };
});

// ========== 탭1: 작물별 ==========
let curCrop = null;
function drawCropChips(filter){
  const box=$('#cropChips'); box.innerHTML='';
  const f=norm(filter);
  DATA.crops.filter(c=>!f||norm(c).includes(f)).forEach(c=>{
    const ch=el('div','chip'+(c===curCrop?' on':''),esc(c));
    ch.onclick=()=>{ curCrop=(curCrop===c?null:c); drawCropChips($('#cropSearch').value); drawCropResult(); };
    box.appendChild(ch);
  });
}
let cropDrugTerm = '';
function drawCropResult(){
  const box=$('#cropResult'); box.innerHTML='';
  if(!curCrop){
    box.appendChild(el('div','empty','<div class="big">🌱</div>작물을 선택하세요'));
    return;
  }
  const f=norm(cropDrugTerm);
  if(f){ renderCropDrugCentric(box, f); return; }   // 약제 입력 시: 약제 중심 뷰
  const list=byCrop[curCrop]||[];                    // 기본: 자사약제별 카드
  box.appendChild(el('div','sec-label',`${esc(curCrop)} — 자사약제 ${list.length}종`));
  list.forEach(({product,cats})=>box.appendChild(prodCard(product,cats)));
}
// 약제 중심: 입력 약제를 위에 두고, 구분(살균제→…) 순으로 혼용 가능한 자사약제 묶음
function renderCropDrugCentric(box, f){
  const list=byCrop[curCrop]||[];
  // 검색어가 이 작물의 자사 제품을 가리키면 → 그 제품의 혼용목록(전방, 타사 포함) = 약제명 탭과 동일
  const ownHits=list.filter(x=>norm(x.product).includes(f));
  if(ownHits.length){
    ownHits.forEach(({product,cats})=>{
      box.appendChild(el('div','sec-label',
        `<span class="own">자사</span> ${esc(product)} — ${esc(curCrop)} · 혼용 가능 약제`));
      const oc=el('div','card open'), ob=el('div','card-b');
      ob.appendChild(renderCats(cats)); oc.appendChild(ob); box.appendChild(oc);
    });
    return;
  }
  const catMap={};                 // 구분 → Set(자사약제명)
  const drugSet=new Set(), prodSet=new Set();
  list.forEach(({product,cats})=>cats.forEach(ct=>{
    const m=ct.items.filter(it=>norm(it).includes(f)||norm(expandName(it)).includes(f));
    if(!m.length) return;
    let g;
    if(ct.cat==='3종혼합'){ g='3종혼합'; }
    else {
      m.forEach(it=>drugSet.add(expandName(it)));     // 라벨용: 단일약제만
      g = prodType[product] || ct.cat;                // 혼용 상대 약제를 '그 약제 자신의 종류'로 분류
    }
    (catMap[g]=catMap[g]||new Set()).add(product);
    prodSet.add(product);
  }));
  // 검색 약제 자신이 자사 제품이면 자기 자신은 제외 (알지오 검색 시 알지오가 목록에 뜨는 오류 방지)
  drugSet.forEach(d=>{ Object.values(catMap).forEach(s=>s.delete(d)); prodSet.delete(d); });
  Object.keys(catMap).forEach(c=>{ if(!catMap[c].size) delete catMap[c]; });
  const drugLabel = drugSet.size===1 ? [...drugSet][0] : `"${cropDrugTerm}"`;
  box.appendChild(el('div','sec-label',
    `${esc(drugLabel)} — ${esc(curCrop)} · 자사약제 ${prodSet.size}종과 혼용 가능`));
  if(!prodSet.size){ box.appendChild(el('div','empty','<div class="big">😶</div>해당 약제가 없습니다')); return; }
  const card=el('div','card open'), body=el('div','card-b');
  CAT_ORDER.forEach(cat=>{
    if(!catMap[cat]) return;
    const prods=[...catMap[cat]].sort((a,b)=>a.localeCompare(b,'ko'));
    const row=el('div','catrow',`${badge(cat)} <span class="cnt">${prods.length}종</span>`);
    const items=el('div','items');
    prods.forEach(p=>items.appendChild(el('div','item',esc(p))));
    row.appendChild(items); body.appendChild(row);
  });
  card.appendChild(body); box.appendChild(card);
}
function prodCard(product,cats,markN,open){
  const n=cats.reduce((s,c)=>s+c.items.length,0);
  const card=el('div','card'+(open?' open':''));
  const h=el('div','card-h',`<span>${esc(product)}</span><span><span class="cnt">${n}건</span><span class="arw">▶</span></span>`);
  const b=el('div','card-b'); b.appendChild(renderCats(cats,markN));
  h.onclick=()=>card.classList.toggle('open');
  card.append(h,b); return card;
}
$('#cropSearch').oninput=e=>{ $('#cropClear').style.display=e.target.value?'block':'none'; drawCropChips(e.target.value); };
$('#cropClear').onclick=()=>{ $('#cropSearch').value=''; $('#cropClear').style.display='none'; drawCropChips(''); };

// ========== 탭2: 약제명 (자사 + 타사 통합) ==========
function setupAC(inputSel, clearSel, acSel, names, onPick, subFn, dispFn){
  const inp=$(inputSel), ac=$(acSel), clr=$(clearSel);
  const disp = n => dispFn?dispFn(n):n;
  inp.oninput=()=>{
    clr.style.display=inp.value?'block':'none';
    const f=norm(inp.value); ac.innerHTML='';
    if(!f){ ac.style.display='none'; return; }
    const hits=names.filter(n=>norm(disp(n)).includes(f)||norm(n).includes(f)).slice(0,40);
    if(!hits.length){ ac.style.display='none'; return; }
    hits.forEach(n=>{
      const sub=subFn?subFn(n):'';
      const it=el('div','acitem',`${esc(disp(n))}${sub?`<span class="sub">${sub}</span>`:''}`);
      it.onclick=()=>{ inp.value=disp(n); ac.style.display='none'; clr.style.display='block'; onPick(n); };
      ac.appendChild(it);
    });
    ac.style.display='block';
  };
  clr.onclick=()=>{ inp.value=''; clr.style.display='none'; ac.style.display='none'; onPick(null); };
  document.addEventListener('click',e=>{ if(!ac.parentNode.contains(e.target)) ac.style.display='none'; });
}
let curProd = null;
let prodCropTerm = '';
function drawProdResult(name){
  curProd = name;
  renderProd();
}
function renderProd(){
  const box=$('#prodResult'); box.innerHTML='';
  if(curProd){
    if(canonIsOwn(curProd)) renderOwn(box, canonOwnName(curProd));  // 자사약제 → 책자 그대로
    else                    renderOther(box, curProd);             // 타사약제 → 어디서 무엇과 혼용 가능한지
  } else {
    box.appendChild(el('div','empty','<div class="big">🧪</div>약제명을 검색하세요<br>(자사·타사 모두)'));
  }
}
// 자사약제: 작물별 혼용가능 약제 (책자 페이지)
function renderOwn(box, name){
  const p=DATA.products.find(x=>x.name===name);
  if(!p){ box.appendChild(el('div','empty','결과 없음')); return; }
  const f=norm(prodCropTerm);
  let crops = f ? p.crops.filter(cr=>norm(cr.crop).includes(f)) : p.crops;
  box.appendChild(el('div','sec-label',
    `<span class="own">자사</span> ${esc(p.name)} — 등록 작물 ${crops.length}종${f?` · "${esc(prodCropTerm)}"`:''}`));
  if(!crops.length){ box.appendChild(el('div','empty','<div class="big">😶</div>해당 작물 없음')); return; }
  crops.forEach(cr=>{
    const n=cr.cats.reduce((s,c)=>s+c.items.length,0);
    const card=el('div','card open');
    const h=el('div','card-h',`<span>🌾 ${esc(cr.crop)}</span><span><span class="cnt">${n}건</span><span class="arw">▶</span></span>`);
    const b=el('div','card-b'); b.appendChild(renderCats(cr.cats));
    h.onclick=()=>card.classList.toggle('open');
    card.append(h,b); box.appendChild(card);
  });
}
// 타사약제: 어느 작물에서 어떤 자사약제와 혼용 가능한지 (name = 풀네임/정규화 키)
function renderOther(box, name){
  const hits = canonMixHits(name);
  if(!hits.length){ box.appendChild(el('div','empty','<div class="big">😶</div>해당 약제의 혼용정보가 없습니다')); return; }
  const byc={};
  hits.forEach(([prod,crop,cat])=>{ (byc[crop]=byc[crop]||[]).push({prod,cat}); });
  for(const c in byc) byc[c].sort((a,b)=>a.prod.localeCompare(b.prod,'ko'));
  const f=norm(prodCropTerm);
  let cropKeys=Object.keys(byc).sort((a,b)=>a.localeCompare(b,'ko'));
  if(f) cropKeys=cropKeys.filter(c=>norm(c).includes(f));
  const total=cropKeys.reduce((s,c)=>s+byc[c].length,0);
  box.appendChild(el('div','sec-label',
    `${esc(name)} — ${cropKeys.length}개 작물 · 자사약제 ${total}종과 혼용 가능${f?` · "${esc(prodCropTerm)}"`:''}`));
  if(!cropKeys.length){ box.appendChild(el('div','empty','<div class="big">😶</div>해당 작물 없음')); return; }
  cropKeys.forEach(crop=>{
    box.appendChild(el('div','rev-grp',`🌾 ${esc(crop)}`));
    byc[crop].forEach(({prod,cat})=>{
      box.appendChild(el('div','rev-line',
        `${badge(prodType[prod]||cat)} <b>${esc(prod)}</b> <span style="color:var(--mut)">와(과) 혼용 가능</span>`));
    });
  });
}
setupAC('#prodSearch','#prodClear','#prodAc',allNames,drawProdResult,
  n=>canonIsOwn(n)?'자사':`${canonMixHits(n).length}건`);

// ===== 보조 필터: 결과를 직접 좁힘 =====
// 작물별 탭 — 약제 이름으로 좁히기
$('#cropDrugSearch').oninput=e=>{
  cropDrugTerm=e.target.value;
  $('#cropDrugClear').style.display=cropDrugTerm?'block':'none';
  drawCropResult();
};
$('#cropDrugClear').onclick=()=>{
  cropDrugTerm=''; $('#cropDrugSearch').value=''; $('#cropDrugClear').style.display='none';
  drawCropResult();
};
// 약제명 탭 — 작물 이름으로 좁히기
$('#prodCropSearch').oninput=e=>{
  prodCropTerm=e.target.value;
  $('#prodCropClear').style.display=prodCropTerm?'block':'none';
  renderProd();
};
$('#prodCropClear').onclick=()=>{
  prodCropTerm=''; $('#prodCropSearch').value=''; $('#prodCropClear').style.display='none';
  renderProd();
};

// 초기화
drawCropChips('');
drawCropResult();
drawProdResult(null);
</script>
</body>
